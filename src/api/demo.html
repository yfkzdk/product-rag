<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIKG · 工业智能知识图谱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   IIKG · Industrial Intelligence Knowledge Graph
   Command Center Interface
   ============================================================ */
:root {
  --bg-root: #05080f;
  --bg-elevated: #0a0e1a;
  --bg-card: #0d1225;
  --bg-input: #080c18;
  --border-dim: #141b2d;
  --border-mid: #1e2a45;
  --border-bright: #2a3a60;
  --text-prime: #e2e8f4;
  --text-second: #8896b4;
  --text-mute: #4a5570;
  --accent: #f59e0b;
  --accent-glow: rgba(245, 158, 11, 0.25);
  --cyan: #06d6a0;
  --cyan-glow: rgba(6, 214, 160, 0.2);
  --blue: #3b82f6;
  --blue-glow: rgba(59, 130, 246, 0.2);
  --red: #ef4444;
  --red-glow: rgba(239, 68, 68, 0.25);
  --violet: #8b5cf6;
  --font-sans: 'Noto Sans SC', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-root);
  color: var(--text-prime);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Scanline grain */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
  );
  opacity: 0.6;
}

/* Ambient grid */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(20,27,45,0.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(20,27,45,0.4) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, black 30%, transparent 70%);
}

/* ===== Header ===== */
.header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; border-bottom: 1px solid var(--border-dim);
  background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo-mark {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #f59e0b, #d97706);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: #000;
  box-shadow: 0 0 24px var(--accent-glow);
  animation: logoPulse 3s infinite ease-in-out;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 24px var(--accent-glow); }
  50% { box-shadow: 0 0 40px rgba(245,158,11,0.4); }
}
.header-title { font-size: 17px; font-weight: 700; letter-spacing: 0.02em; line-height:1.2; }
.header-sub { font-size: 10px; color: var(--text-mute); font-family: var(--font-mono); letter-spacing:0.06em; }

.health-row { display:flex; gap:10px; }
.health-pill {
  display:flex; align-items:center; gap:7px;
  font-size: 10px; font-family: var(--font-mono); color: var(--text-second);
  padding: 6px 12px; border-radius: 20px;
  background: var(--bg-card); border: 1px solid var(--border-dim);
  transition: all 0.3s var(--ease-out);
}
.health-pill .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.health-pill .dot.up { background:var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); animation: dotPulse 2s infinite; }
.health-pill .dot.down { background:var(--red); box-shadow: 0 0 8px var(--red-glow); }
.health-pill .dot.degraded { background:var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
@keyframes dotPulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

/* ===== Layout ===== */
.layout { display:flex; height:calc(100vh - 69px); position:relative; z-index:1; }
.main-col { flex:1; min-width:0; display:flex; flex-direction:column; overflow-y:auto; padding:36px 40px 24px; }
.side-col { width:420px; flex-shrink:0; background:rgba(10,14,26,0.7); border-left:1px solid var(--border-dim); display:flex; flex-direction:column; overflow-y:auto; padding:20px 22px; gap:18px; backdrop-filter: blur(10px); }

/* ===== Search Hero ===== */
.hero { text-align:center; margin-bottom:28px; }
.hero h1 { font-size:32px; font-weight:900; letter-spacing:0.02em; margin-bottom:4px; }
.hero h1 .hl { color:var(--accent); }
.hero .sub { font-size:12px; color:var(--text-mute); font-family:var(--font-mono); letter-spacing:0.06em; }

.search-wrap {
  max-width: 720px; margin:0 auto 16px;
}
.search-box {
  display:flex; border:1px solid var(--border-mid); border-radius:var(--radius-lg);
  background:var(--bg-input); overflow:hidden;
  transition: border-color 0.2s var(--ease-out), box-shadow 0.3s var(--ease-out);
}
.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 32px var(--accent-glow), inset 0 0 32px rgba(245,158,11,0.04);
}
.search-box input {
  flex:1; padding:15px 20px; border:none; background:transparent;
  color:var(--text-prime); font-size:15px; font-family:var(--font-sans);
  outline:none; letter-spacing:0.01em;
}
.search-box input::placeholder { color:var(--text-mute); }
.search-box button {
  padding:15px 28px; border:none; background:transparent;
  color:var(--accent); font-size:14px; font-weight:700; cursor:pointer;
  letter-spacing:0.04em; transition:all 0.2s var(--ease-out);
  border-left:1px solid var(--border-dim); font-family:var(--font-sans);
}
.search-box button:hover { background:var(--accent); color:#000; }
.search-box button:disabled { color:var(--text-mute); pointer-events:none; }

/* Search hints */
.hints { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; max-width:720px; margin:0 auto 8px; }
.hint {
  padding:6px 14px; border-radius:20px; border:1px solid var(--border-dim);
  background:var(--bg-card); color:var(--text-mute);
  font-size:11px; cursor:pointer; font-family:var(--font-mono);
  transition:all 0.2s var(--ease-out); letter-spacing:0.02em;
}
.hint:hover { border-color:var(--accent); color:var(--accent); background:rgba(245,158,11,0.06); }
.hint-tag {
  display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px;
  margin-right:4px; font-weight:600; letter-spacing:0.04em;
  background:rgba(139,92,246,0.15); color:var(--violet);
}

/* ===== Results ===== */
.results-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }

.result-card {
  background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--radius-lg);
  overflow:hidden; animation: cardSlide 0.4s var(--ease-spring);
  transition:border-color 0.2s;
}
.result-card:hover { border-color:var(--border-mid); }
@keyframes cardSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.card-top {
  display:flex; align-items:center; gap:10px; padding:16px 20px 0;
  flex-wrap:wrap;
}
.intent-tag {
  font-size:10px; padding:4px 10px; border-radius:5px; font-family:var(--font-mono);
  font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
}
.intent-tag.spec { background:rgba(59,130,246,0.12); color:var(--blue); border:1px solid rgba(59,130,246,0.25); }
.intent-tag.troubleshoot { background:rgba(239,68,68,0.12); color:var(--red); border:1px solid rgba(239,68,68,0.25); }
.intent-tag.compatibility { background:rgba(6,214,160,0.12); color:var(--cyan); border:1px solid rgba(6,214,160,0.25); }
.intent-tag.general { background:rgba(245,158,11,0.12); color:var(--accent); border:1px solid rgba(245,158,11,0.25); }

.conf-badge {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-family:var(--font-mono); font-weight:700;
}
.conf-badge.high { background:rgba(6,214,160,0.1); color:var(--cyan); border:2px solid var(--cyan); }
.conf-badge.mid { background:rgba(245,158,11,0.1); color:var(--accent); border:2px solid var(--accent); }
.conf-badge.low { background:rgba(239,68,68,0.1); color:var(--red); border:2px solid var(--red); }

.time-chip {
  font-size:10px; padding:3px 8px; border-radius:4px; font-family:var(--font-mono);
  background:rgba(136,150,180,0.06); color:var(--text-mute);
  border:1px solid var(--border-dim);
}

.answer-body { padding:14px 20px 16px; font-size:14px; line-height:1.85; color:var(--text-second); white-space:pre-wrap; word-break:break-word; }

.source-row {
  display:flex; gap:5px; flex-wrap:wrap; padding:10px 20px 14px;
  border-top:1px solid var(--border-dim);
}
.source-chip {
  font-size:9px; padding:3px 8px; border-radius:4px; font-family:var(--font-mono);
  background:rgba(136,150,180,0.04); color:var(--text-mute);
  border:1px solid var(--border-dim);
}

/* Empty state */
.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; color:var(--text-mute); text-align:center;
}
.empty-state .term-icon {
  font-size:56px; font-family:var(--font-mono); font-weight:700;
  background:linear-gradient(135deg, var(--accent), var(--text-mute));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  opacity:0.5;
}
.empty-state .term-line {
  font-size:12px; font-family:var(--font-mono); letter-spacing:0.05em;
  animation: blink 1.5s steps(1) infinite;
}
@keyframes blink { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

/* ===== Pipeline Sidebar ===== */
.side-col h3 {
  font-size:9px; text-transform:uppercase; letter-spacing:0.12em;
  color:var(--text-mute); font-family:var(--font-mono); font-weight:600;
  padding-bottom:6px; border-bottom:1px solid var(--border-dim);
}

/* Pipeline stages */
.timeline { position:relative; padding-left:18px; }
.timeline::before {
  content:''; position:absolute; left:5px; top:4px; bottom:4px;
  width:1px; background:var(--border-dim);
}
.stage-row {
  position:relative; padding:10px 0 10px 14px;
  transition:all 0.4s var(--ease-out);
}
.stage-row::before {
  content:''; position:absolute; left:-13px; top:16px;
  width:8px; height:8px; border-radius:50%;
  background:var(--border-bright); border:2px solid var(--bg-card);
  transition:all 0.3s var(--ease-out);
}
.stage-row.done::before { background:var(--cyan); box-shadow:0 0 8px var(--cyan-glow); }
.stage-row.active::before { background:var(--accent); box-shadow:0 0 8px var(--accent-glow); animation:dotPulse 1s infinite; }
.stage-row.skipped::before { background:var(--text-mute); }
.stage-row.error::before { background:var(--red); box-shadow:0 0 8px var(--red-glow); }

.stage-row .s-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.stage-row .s-name { font-size:12px; font-weight:600; }
.stage-row .s-tag {
  font-size:8px; padding:2px 6px; border-radius:3px; font-family:var(--font-mono);
  font-weight:700; letter-spacing:0.04em;
}
.s-tag.rule { background:rgba(245,158,11,0.15); color:var(--accent); }
.s-tag.llm { background:rgba(59,130,246,0.15); color:var(--blue); }
.s-tag.skip { background:rgba(136,150,180,0.08); color:var(--text-mute); }
.s-tag.err { background:rgba(239,68,68,0.15); color:var(--red); }

.stage-row .s-detail { font-size:10px; color:var(--text-mute); font-family:var(--font-mono); line-height:1.5; word-break:break-all; }
.stage-row .s-dur {
  font-size:9px; color:var(--text-mute); margin-top:2px;
  display:flex; align-items:center; gap:4px;
}
.s-dur-bar {
  height:2px; border-radius:2px;
  background:linear-gradient(90deg, var(--accent), var(--accent) var(--pct, 0%), transparent var(--pct, 0%));
  transition: width 0.5s var(--ease-out);
}

.stage-row.skipped { opacity:0.4; }

/* ===== Metrics Grid ===== */
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.metric-card {
  background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--radius-md);
  padding:14px; text-align:center;
}
.metric-card .m-val {
  font-size:24px; font-weight:700; font-family:var(--font-mono); letter-spacing:0.02em;
  margin-bottom:3px;
}
.metric-card .m-label { font-size:9px; color:var(--text-mute); font-family:var(--font-mono); letter-spacing:0.05em; }
.m-val.cyan { color:var(--cyan); }
.m-val.amber { color:var(--accent); }
.m-val.blue { color:var(--blue); }

/* Degradation */
.deg-list { font-size:10px; font-family:var(--font-mono); color:var(--text-mute); line-height:2; }
.deg-list .dl-row { display:flex; justify-content:space-between; }
.deg-list .dl-row .dl-val.off { color:var(--accent); }
.deg-list .dl-row .dl-val.on { color:var(--cyan); }

/* Alert */
.alert-item {
  font-size:9px; padding:7px 10px; border-radius:5px; font-family:var(--font-mono);
  display:flex; align-items:center; gap:6px; letter-spacing:0.03em; margin-bottom:4px;
}
.alert-item.p0 { background:rgba(239,68,68,0.08); color:var(--red); border-left:3px solid var(--red); }
.alert-item.p1 { background:rgba(245,158,11,0.08); color:var(--accent); border-left:3px solid var(--accent); }
.alert-item.p2 { background:rgba(59,130,246,0.08); color:var(--blue); border-left:3px solid var(--blue); }

/* ===== Footer ===== */
.side-footer {
  font-size:9px; color:var(--text-mute); text-align:center;
  font-family:var(--font-mono); padding-top:10px; border-top:1px solid var(--border-dim);
  letter-spacing:0.04em;
}

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-dim); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-mid); }

/* Responsive */
@media (max-width:900px) {
  .layout { flex-direction:column; }
  .side-col { width:100%; max-height:45vh; border-left:none; border-top:1px solid var(--border-dim); }
  .main-col { padding:20px 16px; }
  .hero h1 { font-size:24px; }
  .search-box button { padding:15px 18px; font-size:13px; }
  .health-row { display:none; }
  .header-sub { display:none; }
}

@media (prefers-reduced-motion:reduce) {
  *,*::before,*::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; }
  body::after { display:none; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-left">
    <div class="logo-mark">KG</div>
    <div>
      <div class="header-title">工业智能知识图谱</div>
      <div class="header-sub">INTENT → VALIDATE → RETRIEVE → RRF → GENERATE</div>
    </div>
  </div>
  <div class="health-row" id="healthRow"></div>
</header>

<!-- ===== Body ===== -->
<div class="layout">

  <!-- ===== MAIN ===== -->
  <main class="main-col">
    <div class="hero">
      <h1>知识<span class="hl">检索引擎</span></h1>
      <p class="sub">四路混合检索 · RRF 融合 · 工业产品知识图谱</p>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="queryInput" placeholder="输入产品型号（如 ATX-500）、故障代码（如 E001）或技术问题..."
               onkeydown="if(event.key==='Enter')doSearch()" autofocus>
        <button id="searchBtn" onclick="doSearch()">检 索</button>
      </div>
    </div>

    <div class="hints">
      <button class="hint" onclick="quickAsk('ATX-500 的额定电压和功率是多少？')">
        <span class="hint-tag">SPEC</span>ATX-500 规格
      </button>
      <button class="hint" onclick="quickAsk('E001 无输出故障怎么解决？')">
        <span class="hint-tag">FAULT</span>E001 故障排查
      </button>
      <button class="hint" onclick="quickAsk('ATX-700 和 PROD-002 兼容吗？')">
        <span class="hint-tag">COMPAT</span>产品兼容性
      </button>
      <button class="hint" onclick="quickAsk('VFD-750 过流报警怎么处理？')">
        <span class="hint-tag">FAULT</span>VFD-750 过流
      </button>
      <button class="hint" onclick="quickAsk('SENS-100 温度变送器安装步骤')">
        <span class="hint-tag">SPEC</span>变送器安装
      </button>
    </div>

    <div class="results-area" id="resultsArea">
      <div class="empty-state">
        <div class="term-icon">&gt;_</div>
        <div class="term-line">输入查询以检索工业知识图谱</div>
      </div>
    </div>
  </main>

  <!-- ===== SIDEBAR ===== -->
  <aside class="side-col">
    <h3>Pipeline 追踪</h3>
    <div class="timeline" id="timeline">
      <div class="stage-row" id="st-row-0">
        <div class="s-head"><span class="s-name">意图分类</span><span class="s-tag rule" id="st-tag-0"></span></div>
        <div class="s-detail" id="st-det-0">等待查询…</div>
      </div>
      <div class="stage-row" id="st-row-1">
        <div class="s-head"><span class="s-name">规则校验</span></div>
        <div class="s-detail" id="st-det-1">—</div>
      </div>
      <div class="stage-row" id="st-row-2">
        <div class="s-head"><span class="s-name">多路检索</span></div>
        <div class="s-detail" id="st-det-2">—</div>
      </div>
      <div class="stage-row" id="st-row-3">
        <div class="s-head"><span class="s-name">RRF 融合 + 重排</span></div>
        <div class="s-detail" id="st-det-3">—</div>
      </div>
      <div class="stage-row" id="st-row-4">
        <div class="s-head"><span class="s-name">响应生成</span></div>
        <div class="s-detail" id="st-det-4">—</div>
      </div>
    </div>

    <h3>性能指标</h3>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="m-val amber" id="metLatency">—</div>
        <div class="m-label">总延迟 (ms)</div>
      </div>
      <div class="metric-card">
        <div class="m-val cyan" id="metSources">0</div>
        <div class="m-label">检索来源</div>
      </div>
      <div class="metric-card">
        <div class="m-val" id="metQueries" style="color:var(--text-prime)">0</div>
        <div class="m-label">累计查询</div>
      </div>
      <div class="metric-card">
        <div class="m-val blue" id="metUptime">—</div>
        <div class="m-label">运行时间</div>
      </div>
    </div>

    <h3>服务状态</h3>
    <div class="deg-list" id="degList">
      <div class="dl-row"><span>PostgreSQL</span><span class="dl-val off">检测中…</span></div>
      <div class="dl-row"><span>Milvus</span><span class="dl-val off">检测中…</span></div>
      <div class="dl-row"><span>Redis</span><span class="dl-val off">检测中…</span></div>
      <div class="dl-row"><span>Neo4j</span><span class="dl-val off">检测中…</span></div>
    </div>

    <div id="alertsArea"></div>

    <div class="side-footer">IIKG v1.0 · DETERMINISTIC PIPELINE</div>
  </aside>
</div>

<script>
/* ============================================================
   IIKG Command Center — Client Logic
   ============================================================ */
const INTENT_LABELS = { spec:'规格查询', troubleshoot:'故障排查', compatibility:'兼容性查询', general:'通用查询' };
const STAGE_NAMES = ['意图分类','规则校验','多路检索','RRF 融合 + 重排','响应生成'];
const LLM_STAGES = new Set(['多路检索','RRF 融合 + 重排','响应生成']);

function $(id) { return document.getElementById(id); }

/* ===== Pipeline Reset ===== */
function resetPipeline() {
  for (let i = 0; i < 5; i++) {
    const row = $('st-row-'+i);
    if (row) { row.className = 'stage-row'; }
    const det = $('st-det-'+i);
    if (det) det.textContent = (i === 1 || i === 3) ? '—' : '等待中…';
    const tag = $('st-tag-'+i);
    if (tag) { tag.textContent = ''; tag.className = 's-tag rule'; }
  }
  $('metLatency').textContent = '—';
  $('metSources').textContent = '0';
}

function stageIdx(name) {
  const m = {
    '缓存查询':0, '意图分类':0,
    '规则校验':1, '多路检索':2, 'RRF融合+重排':3,
    '响应生成':4, '对话上下文':4, '澄清生成':0
  };
  return m[name] !== undefined ? m[name] : -1;
}

function updateStage(idx, status, detail, ms) {
  const row = $('st-row-'+idx);
  if (!row) return;
  row.className = 'stage-row ' + status;
  const det = $('st-det-'+idx);
  let html = detail || '';
  if (ms != null && ms > 0) {
    html += ' <span style="color:var(--text-mute)">(' + ms.toFixed(0) + 'ms)</span>';
  }
  if (det) det.innerHTML = html;
}

function renderTrace(trace) {
  if (!trace || !trace.stages) return;

  // Aggregate stages
  const agg = {};
  for (let i = 0; i < 5; i++) {
    agg[i] = { status:'done', parts:[], totalMs:0, isLLM:false };
  }

  for (const st of trace.stages) {
    const idx = stageIdx(st.name);
    if (idx < 0) continue;
    const a = agg[idx];
    if (st.status === 'error' || st.status === 'skipped') a.status = st.status;
    if (st.detail) a.parts.push(st.detail);
    a.totalMs += st.duration_ms || 0;
    if (LLM_STAGES.has(st.name)) a.isLLM = true;
  }

  // Render
  for (let i = 0; i < 5; i++) {
    const a = agg[i];
    const detail = a.parts.length > 0 ? a.parts.join(' · ') : (a.status === 'done' ? '完成' : '');
    updateStage(i, a.status, detail, a.totalMs);
    // Tag
    if (i === 0) {
      const tag = $('st-tag-0');
      const intent = (trace.metadata || {}).intent || 'general';
      tag.textContent = INTENT_LABELS[intent] || intent;
      tag.className = 's-tag rule';
    }
  }

  // Metrics
  if (trace.total_ms) $('metLatency').textContent = trace.total_ms.toFixed(0);
  const sc = trace.metadata?.source_count;
  if (sc !== undefined && sc !== null) $('metSources').textContent = sc;
}

/* ===== Search ===== */
async function doSearch() {
  const input = $('queryInput');
  const btn = $('searchBtn');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  btn.disabled = true;
  btn.textContent = '检索中…';
  resetPipeline();
  updateStage(0, 'active', '分类中…', 0);

  try {
    const r = await fetch('/api/v1/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
    const data = await r.json();

    // Render pipeline trace
    if (data.pipeline_trace) {
      renderTrace(data.pipeline_trace);
    } else {
      // Legacy fallback
      const label = INTENT_LABELS[data.intent] || data.intent;
      updateStage(0, 'done', '意图: ' + label, 0);
      const blocked = !data.sources || data.sources.length === 0;
      if (blocked && (data.intent === 'spec' || data.intent === 'troubleshoot')) {
        updateStage(1, 'done', '拦截: 缺少必要参数', 0);
        updateStage(2, 'skipped', '跳过 (规则拦截)', 0);
        updateStage(3, 'skipped', '跳过', 0);
        updateStage(4, 'skipped', '跳过', 0);
      } else {
        updateStage(1, 'done', '通过', 0);
        updateStage(2, 'done', 'HyDE + Vector + KG', 0);
        updateStage(3, 'done', 'RRF k=60', 0);
        updateStage(4, 'done', '规则引擎生成', 0);
      }
    }

    $('metSources').textContent = (data.sources || []).length;
    addResult(data);
    fetchMetrics();
  } catch(e) {
    addResult({ answer: '请求失败: ' + e.message, intent: 'general', sources: [], confidence: 0 });
  }

  btn.disabled = false;
  btn.textContent = '检 索';
}

function quickAsk(q) { $('queryInput').value = q; doSearch(); }

/* ===== Result Card ===== */
function addResult(data) {
  const area = $('resultsArea');
  const empty = area.querySelector('.empty-state');
  if (empty) empty.remove();

  const intent = data.intent || 'general';
  const conf = data.confidence || 0;
  const confCls = conf >= 0.8 ? 'high' : conf >= 0.6 ? 'mid' : 'low';
  const totalMs = data.pipeline_trace?.total_ms;

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML =
    '<div class="card-top">' +
      '<span class="intent-tag ' + intent + '">' + (INTENT_LABELS[intent] || intent) + '</span>' +
      '<span class="conf-badge ' + confCls + '">' + (conf * 100).toFixed(0) + '%</span>' +
      (totalMs != null ? '<span class="time-chip">' + totalMs.toFixed(0) + 'ms</span>' : '') +
    '</div>' +
    '<div class="answer-body">' + escHtml(data.answer) + '</div>' +
    (data.sources && data.sources.length > 0 ?
      '<div class="source-row">' +
        data.sources.slice(0, 8).map(function(s) {
          return '<span class="source-chip">' + escHtml(String(s)) + '</span>';
        }).join('') +
      '</div>' : '');

  area.insertBefore(card, area.firstChild);
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ===== Health Check ===== */
async function checkHealth() {
  try {
    const r = await fetch('/api/v1/health');
    const h = await r.json();
    const svcs = h.services || {};

    // Header pills
    const pills = [
      ['PG', 'PG', svcs.postgres],
      ['MV', 'Milvus', svcs.milvus],
      ['RD', 'Redis', svcs.redis],
      ['N4', 'Neo4j', svcs.neo4j],
    ];
    $('healthRow').innerHTML = pills.map(function(p) {
      var s = String(p[2] || '');
      var cls = 'up';
      if (s.includes('unhealthy') || s.includes('down')) cls = 'down';
      else if (s.includes('not_configured') || s.includes('unavailable')) cls = 'degraded';
      return '<span class="health-pill"><span class="dot ' + cls + '"></span>' + p[0] + '</span>';
    }).join('');

    // Degradation list
    $('degList').innerHTML = pills.map(function(p) {
      var s = String(p[2] || '');
      var status = 'HEALTHY', cls = 'on';
      if (s.includes('unhealthy')) { status = 'DOWN'; cls = 'off'; }
      else if (s.includes('not_configured') || s.includes('unavailable')) { status = 'OFFLINE'; cls = 'off'; }
      return '<div class="dl-row"><span>' + p[1] + '</span><span class="dl-val ' + cls + '">' + status + '</span></div>';
    }).join('');

  } catch(e) { /* silent */ }
}

/* ===== Metrics ===== */
async function fetchMetrics() {
  try {
    const r = await fetch('/api/v1/metrics');
    const m = await r.json();
    if (m.total_queries > 0) {
      $('metQueries').textContent = m.total_queries;
      $('metUptime').textContent = (m.uptime_seconds || 0).toFixed(0) + 's';
    }
    const alerts = m.alerts || [];
    const aa = $('alertsArea');
    if (alerts.length > 0) {
      aa.innerHTML = '<h3 style="margin-top:4px;">告警</h3>' +
        alerts.map(function(a) {
          var sev = (a.severity || 'P1').toLowerCase();
          return '<div class="alert-item ' + sev + '">' +
            (sev === 'p0' ? 'CRIT: ' : 'WARN: ') + escHtml(a.message || String(a)) +
          '</div>';
        }).join('');
    } else { aa.innerHTML = ''; }
  } catch(e) {}
}

/* ===== Init ===== */
checkHealth();
setInterval(checkHealth, 30000);
setInterval(fetchMetrics, 15000);
</script>
